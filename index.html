<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AISYLE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #fff url("assets/bg.png") center / cover fixed;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding-left: 8vw;
  }
  /* Dark left gradient for text readability */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(90deg, rgba(0,0,0, 0.35) 0%, rgba(0,0,0, 0.1) 40%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  h1 {
    font-family: STZhongsong, "华文中宋", SimSun, serif;
    font-size: 5rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    margin-bottom: 1.5rem;
    text-shadow: 0 2px 12px rgba(0,0,0, 0.4);
  }

  .links {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.6rem;
  }
  .link-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 1.15rem;
    color: rgba(255,255,255, 0.85);
    text-decoration: none;
    padding: 0.4rem 0;
    transition: color 0.3s, gap 0.3s;
  }
  .link-item:hover {
    color: #fff;
    gap: 10px;
  }
  .link-icon {
    width: 1.2em;
    height: 1.2em;
    fill: rgba(255,255,255, 0.85);
    transition: fill 0.3s;
  }
  .link-item:hover .link-icon {
    fill: #fff;
  }

  /* Project cards */
  .projects { margin-top: 2rem; }
  .section-title {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: rgba(255,255,255, 0.5);
    margin-bottom: 0.8rem;
  }
  .card + .card { margin-top: 0.6rem; }
  .card {
    display: block;
    text-decoration: none;
    color: rgba(255,255,255, 0.9);
    border: 1px solid rgba(255,255,255, 0.15);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    max-width: 320px;
    transition: background 0.3s, border-color 0.3s;
  }
  .card:hover {
    background: rgba(255,255,255, 0.08);
    border-color: rgba(255,255,255, 0.3);
  }
  .card-title { font-size: 1rem; font-weight: 500; margin-bottom: 0.3rem; }
  .card-desc { font-size: 0.8rem; color: rgba(255,255,255, 0.55); line-height: 1.5; }

  /* Date & Time */
  .date {
    font-size: 2.5rem;
    font-weight: 200;
    letter-spacing: 0.1em;
    color: rgba(255,255,255, 0.8);
    margin-bottom: 0.2rem;
    display: none;
    text-align: center;
    text-shadow: 0 2px 12px rgba(0,0,0, 0.4);
  }
  .date.visible { display: block; }
  .time {
    font-size: 1.7rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: rgba(255,255,255, 0.8);
    margin-bottom: 0.8rem;
    display: none;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0, 0.3);
  }
  .time.visible { display: block; }

  /* Button */
  .btn {
    display: inline-block;
    margin-top: 2rem;
    padding: 0.6rem 1.5rem;
    border: 1px solid rgba(255,255,255, 0.3);
    border-radius: 100px;
    color: rgba(255,255,255, 0.85);
    text-decoration: none;
    font-size: 0.9rem;
    transition: background 0.3s, border-color 0.3s;
  }
  .btn:hover {
    background: rgba(255,255,255, 0.1);
    border-color: rgba(255,255,255, 0.5);
  }
  .btn-block {
    display: block;
    max-width: 320px;
    text-align: center;
  }

</style>
</head>
<body>

<div style="position:relative;z-index:1">
  <p class="date" id="dateEl"></p>
  <p class="time" id="timeEl"></p>
  <h1>AISYLE</h1>
  <div class="links">
    <a class="link-item" href="https://github.com/AISYLE5" target="_blank" rel="noopener">
      <svg class="link-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

      </svg>
      <span>GitHub</span>
    </a>
    <a class="link-item" href="https://t.me/AISYLE5" target="_blank" rel="noopener">
      <svg class="link-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M1.946 10.574c4.418-1.925 7.365-3.193 8.84-3.805 4.21-1.75 5.085-2.055 5.655-2.065.126-.002.406.029.588.176.153.124.196.292.216.41.02.117.045.385.025.594-.228 2.395-1.216 8.206-1.719 10.888-.213 1.138-.631 1.52-1.037 1.557-.881.081-1.55-.582-2.403-1.142-1.335-.875-2.089-1.42-3.385-2.274-1.498-.987-.527-1.53.327-2.417.223-.232 4.107-3.764 4.182-4.084.01-.04.018-.19-.07-.269-.09-.079-.222-.052-.317-.03-.135.03-2.287 1.453-6.455 4.267-.611.42-1.164.624-1.66.613-.546-.012-1.597-.309-2.378-.563-.958-.312-1.72-.476-1.653-1.006.034-.276.415-.558 1.141-.847z"/>

  </div>

  <div class="projects">
    <p class="section-title">Projects</p>
    <a class="card" href="https://github.com/AISYLE5/Projects/tree/main/APP/Claude" target="_blank" rel="noopener">
      <p class="card-title">Claude</p>
      <p class="card-desc">Claude Code launcher</p>
    </a>
    <a class="card" href="https://github.com/AISYLE5/Projects/tree/main/APP/ClosePro" target="_blank" rel="noopener">
      <p class="card-title">ClosePro</p>
      <p class="card-desc">Process manager</p>
    </a>
  </div>

  <a class="btn btn-block" href="game.html">Game</a>
  <a class="btn" href="settings.html">Settings</a>
</div>

<script>
(function() {
  var dateEl = document.getElementById('dateEl');
  var timeEl = document.getElementById('timeEl');
  var showDate = localStorage.getItem('showDate') !== 'false';
  var showTime = localStorage.getItem('showTime') !== 'false';

  if (showDate) dateEl.classList.add('visible');
  if (showTime) timeEl.classList.add('visible');

  if (showDate || showTime) {
    function tick() {
      var d = new Date();
      if (showDate) {
        dateEl.textContent =
          d.getFullYear() + '.' +
          String(d.getMonth() + 1).padStart(2, '0') + '.' +
          String(d.getDate()).padStart(2, '0');
      }
      if (showTime) {
        timeEl.textContent =
          String(d.getHours()).padStart(2, '0') + ':' +
          String(d.getMinutes()).padStart(2, '0') + ':' +
          String(d.getSeconds()).padStart(2, '0');
      }
    }
    tick();
    setInterval(tick, 1000);
  }

})();
</script>

</body>
</html>
