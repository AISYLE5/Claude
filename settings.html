<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AISYLE · Settings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #fff url("assets/bg.png") center / cover fixed;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding-left: 8vw;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(90deg, rgba(0,0,0, 0.35) 0%, rgba(0,0,0, 0.1) 40%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }
  .content { position: relative; z-index: 1; }

  .page-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: rgba(255,255,255, 0.5);
    margin-bottom: 1.5rem;
  }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .toggle-label {
    font-size: 1rem;
    color: rgba(255,255,255, 0.85);
  }
  .toggle {
    position: relative;
    display: inline-block;
    width: 48px;
    height: 26px;
    cursor: pointer;
  }
  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .toggle .slider {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255, 0.2);
    border-radius: 26px;
    transition: 0.3s;
  }
  .toggle .slider::before {
    content: '';
    position: absolute;
    left: 3px;
    bottom: 3px;
    width: 20px;
    height: 20px;
    background: #fff;
    border-radius: 50%;
    transition: 0.3s;
  }
  .toggle input:checked + .slider {
    background: rgba(255,255,255, 0.6);
  }
  .toggle input:checked + .slider::before {
    transform: translateX(22px);
  }

  .btn {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 0.6rem 1.5rem;
    border: 1px solid rgba(255,255,255, 0.3);
    border-radius: 100px;
    color: rgba(255,255,255, 0.85);
    text-decoration: none;
    font-size: 0.9rem;
    transition: background 0.3s, border-color 0.3s;
  }
  .btn:hover {
    background: rgba(255,255,255, 0.1);
    border-color: rgba(255,255,255, 0.5);
  }

</style>
</head>
<body>

<div class="content">
  <p class="page-label">Settings</p>

  <div class="toggle-row">
    <span class="toggle-label">Show date</span>
    <label class="toggle">
      <input type="checkbox" id="dateToggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Show time</span>
    <label class="toggle">
      <input type="checkbox" id="timeToggle">
      <span class="slider"></span>
    </label>
  </div>

  <a class="btn" href="index.html">← Back</a>
</div>

<script>
(function() {
  dateToggle.checked = localStorage.getItem('showDate') !== 'false';
  timeToggle.checked = localStorage.getItem('showTime') !== 'false';
  dateToggle.addEventListener('change', function() {
    localStorage.setItem('showDate', this.checked);
  });
  timeToggle.addEventListener('change', function() {
    localStorage.setItem('showTime', this.checked);
  });
})();
</script>

</body>
</html>
