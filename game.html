<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AISYLE · Minesweeper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: url("assets/bg.png") center / cover fixed;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(90deg, rgba(0,0,0, 0.35) 0%, rgba(0,0,0, 0.1) 40%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }
  .content { position: relative; z-index: 1; text-align: center; }

  .page-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: rgba(255,255,255, 0.5);
    margin-bottom: 1.5rem;
  }

  .bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1rem;
  }
  .stat {
    font-size: 1.2rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: rgba(255,255,255, 0.8);
  }

  .grid {
    display: grid;
    gap: 1px;
    background: rgba(255,255,255, 0.15);
    border: 1px solid rgba(255,255,255, 0.2);
    border-radius: 4px;
    overflow: hidden;
    user-select: none;
    margin-bottom: 1.5rem;
    display: inline-grid;
  }
  .cell {
    width: calc((80vmin - 8px) / 9);
    height: calc((80vmin - 8px) / 9);
    background: rgba(255,255,255, 0.6);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(80vmin / 16);
    font-weight: 500;
    transition: background 0.1s;
  }
  .cell:hover { background: rgba(255,255,255, 0.75); }
  .cell.revealed {
    background: rgba(255,255,255, 0.04);
    cursor: default;
  }
  .cell.revealed:hover { background: rgba(255,255,255, 0.04); }
  .cell.mine { background: rgba(255,80,80, 0.4); }
  .cell.flag { color: #f44; }
  .n1 { color: #4fc3f7; }
  .n2 { color: #81c784; }
  .n3 { color: #ef5350; }
  .n4 { color: #7e57c2; }
  .n5 { color: #ff7043; }
  .n6 { color: #26c6da; }
  .n7 { color: #fff; }
  .n8 { color: rgba(255,255,255, 0.5); }

  .btn {
    display: inline-block;
    padding: 0.6rem 1.5rem;
    border: 1px solid rgba(255,255,255, 0.3);
    border-radius: 100px;
    color: rgba(255,255,255, 0.85);
    text-decoration: none;
    font-size: 0.9rem;
    transition: background 0.3s, border-color 0.3s;
    background: none;
    cursor: pointer;
  }
  .btn:hover {
    background: rgba(255,255,255, 0.1);
    border-color: rgba(255,255,255, 0.5);
  }

  .result {
    font-size: 1rem;
    margin-bottom: 1rem;
    color: rgba(255,255,255, 0.8);
  }

</style>
</head>
<body>
<div class="content">
  <div class="bar">
    <span class="stat">💣 <span id="mineCount">10</span></span>
    <span class="stat">⏱ <span id="timer">0</span></span>
  </div>
  <p class="result" id="result"></p>
  <div class="grid" id="grid"></div>
  <div style="display:flex;align-items:center;justify-content:center;gap:1rem;">
    <button class="btn" id="restart" style="margin:0;">New Game</button>
    <button class="btn" id="fullscreenBtn" style="margin:0;">Fullscreen</button>
    <a class="btn" href="index.html" style="margin:0;">← Back</a>
  </div>
</div>

<script>
var ROWS = 9, COLS = 9, MINES = 10;
var board = [], revealed = [], flagged = [], gameOver = false, startTime = null, timerId = null;

var grid = document.getElementById('grid');
var mineCountEl = document.getElementById('mineCount');
var timerEl = document.getElementById('timer');
var resultEl = document.getElementById('result');

function init() {
  board = Array(ROWS).fill().map(function() { return Array(COLS).fill(0); });
  revealed = Array(ROWS).fill().map(function() { return Array(COLS).fill(false); });
  flagged = Array(ROWS).fill().map(function() { return Array(COLS).fill(false); });
  gameOver = false; startTime = null;
  if (timerId) { clearInterval(timerId); timerId = null; }
  timerEl.textContent = '0';
  resultEl.textContent = '';

  var placed = 0;
  while (placed < MINES) {
    var r = Math.floor(Math.random() * ROWS);
    var c = Math.floor(Math.random() * COLS);
    if (board[r][c] !== -1) { board[r][c] = -1; placed++; }
  }
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (board[r][c] === -1) continue;
      var count = 0;
      for (var dr = -1; dr <= 1; dr++) {
        for (var dc = -1; dc <= 1; dc++) {
          var nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) count++;
        }
      }
      board[r][c] = count;
    }
  }
  mineCountEl.textContent = MINES;
  render();
}

function render() {
  var cellSize = 'calc((80vmin - 8px) / 9)';
  grid.style.gridTemplateColumns = 'repeat(' + COLS + ', ' + cellSize + ')';
  grid.innerHTML = '';
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.addEventListener('click', function(e) { clickCell(+this.dataset.row, +this.dataset.col); });
      cell.addEventListener('contextmenu', function(e) { e.preventDefault(); rightClick(+this.dataset.row, +this.dataset.col); });

      if (revealed[r][c]) {
        cell.classList.add('revealed');
        if (board[r][c] === -1) { cell.classList.add('mine'); cell.textContent = '💣'; }
        else if (board[r][c] > 0) { cell.textContent = board[r][c]; cell.classList.add('n' + board[r][c]); }
      } else if (flagged[r][c]) {
        cell.classList.add('flag');
        cell.textContent = '🚩';
      }
      grid.appendChild(cell);
    }
  }
}

function startTimer() {
  if (startTime || gameOver) return;
  startTime = Date.now();
  timerId = setInterval(function() { timerEl.textContent = Math.floor((Date.now() - startTime) / 1000); }, 200);
}

function clickCell(r, c) {
  if (gameOver || revealed[r][c] || flagged[r][c]) return;
  startTimer();
  if (board[r][c] === -1) { lose(r, c); return; }
  reveal(r, c);
  if (checkWin()) { win(); return; }
  render();
}

function reveal(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS || revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  if (board[r][c] === 0) {
    for (var dr = -1; dr <= 1; dr++) {
      for (var dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        reveal(r + dr, c + dc);
      }
    }
  }
}

function rightClick(r, c) {
  if (gameOver || revealed[r][c]) return;
  startTimer();
  flagged[r][c] = !flagged[r][c];
  var f = flagged.reduce(function(s, row) { return s + row.filter(Boolean).length; }, 0);
  mineCountEl.textContent = MINES - f;
  render();
}

function lose(r, c) {
  gameOver = true;
  if (timerId) { clearInterval(timerId); timerId = null; }
  for (var i = 0; i < ROWS; i++) {
    for (var j = 0; j < COLS; j++) {
      if (board[i][j] === -1) revealed[i][j] = true;
    }
  }
  render();
  resultEl.textContent = 'You lose!';
}

function checkWin() {
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (!revealed[r][c] && board[r][c] !== -1) return false;
    }
  }
  return true;
}

function win() {
  gameOver = true;
  if (timerId) { clearInterval(timerId); timerId = null; }
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (board[r][c] === -1) flagged[r][c] = true;
    }
  }
  mineCountEl.textContent = 0;
  render();
  resultEl.textContent = 'You win!';
}

document.getElementById('restart').addEventListener('click', init);
init();

var fsBtn = document.getElementById('fullscreenBtn');
fsBtn.addEventListener('click', function() {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen();
  }
});
</script>
</body>
</html>
